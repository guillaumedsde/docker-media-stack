%YAML 1.1
---
# THE MEDIA STACK #
# this docker-compose file will get a selection of media downloading/management webapps
# I've tried to simplify getting started as much as possible
#   1. configure your desired variables in the .env file
#   2. run `docker compose up -d` from the folder with this docker-copose.yml folder
# NOTE this process is not fully automated and individual configuration of webapps is still required after docker compose

# basic common configuration for most containers
x-conf: &conf
  TZ: ${TZ}
  PGID: ${GID}
  PUID: ${UID}
  # NOTE: this umask env var is mostly used by lsio containers
  #       docker does not have an option to set umask, see:
  #       https://github.com/moby/moby/issues/19189
  UMASK: "077"

# container restart policy
x-common: &common
  restart: on-failure:5
  # Disable DNS search domain
  dns_search: [""]
  logging:
    driver: "local"
    options:
      max-file: "5"
      max-size: "10m"

# Traefik
x-traefik: &traefik
  traefik.enable: "true"

# see https://github.com/renovatebot/renovate/issues/34369#issuecomment-2674092131
x-tandoor-image: &tandoor-image
  image: ghcr.io/tandoorrecipes/recipes:2.6.9@sha256:fc9ee70a490aacdec4a06d7f4b6653c959352c9398e7ff9b9c584e42be78bb5f

services:
  # reverse proxy
  traefik:
    image: docker.io/traefik:v3.7.5@sha256:d6858791f9e74df44ca4014166647c41cdc2abd3bf2a71b832ca4e1c6a91b257
    hostname: traefik
    user: ${UID}:${GID}
    depends_on:
      traefik-socket-proxy:
        condition: service_healthy
      authelia:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      anubis:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    environment:
      TZ: ${TZ}
      # https://github.com/traefik/traefik/issues/11992
      USER: "nobody"
      TRAEFIK_GLOBAL_CHECKNEWVERSION: "false"
      TRAEFIK_GLOBAL_SENDANONYMOUSUSAGE: "false"
      # NOTE: internal
      TRAEFIK_PING_MANUALROUTING: "true"
      TRAEFIK_API: "true"
      TRAEFIK_API_DISABLEDASHBOARDAD: "true"
      # NOTE: providers
      TRAEFIK_PROVIDERS_DOCKER: "true"
      TRAEFIK_PROVIDERS_DOCKER_ENDPOINT: "tcp://traefik-socket-proxy:2375"
      TRAEFIK_PROVIDERS_DOCKER_EXPOSEDBYDEFAULT: "false"
      TRAEFIK_PROVIDERS_FILE_FILENAME: "/etc/traefik/dynamic_configuration.yml"
      # NOTE: entrypoints
      TRAEFIK_ENTRYPOINTS_WEB: "true"
      TRAEFIK_ENTRYPOINTS_WEB_ADDRESS: ":80"
      TRAEFIK_ENTRYPOINTS_WEB_HTTP_REDIRECTIONS_ENTRYPOINT_TO: "websecure"
      TRAEFIK_ENTRYPOINTS_WEBSECURE: "true"
      TRAEFIK_ENTRYPOINTS_WEBSECURE_ADDRESS: ":443"
      TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP3: "true"
      TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP_TLS_CERTRESOLVER: "le"
      TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP_TLS_DOMAINS_0_MAIN: "${root_domain}"
      TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP_TLS_DOMAINS_0_SANS: "*.${root_domain}"
      TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP_MIDDLEWARES: "securityHeaders@file"
      TRAEFIK_ENTRYPOINTS_WEBSECURE_TRANSPORT_RESPONDINGTIMEOUTS_READTIMEOUT: "600" # 10min
      # NOTE: certificate resolver
      TRAEFIK_CERTIFICATESRESOLVERS_LE: "true"
      TRAEFIK_CERTIFICATESRESOLVERS_LE_ACME_DNSCHALLENGE: "true"
      TRAEFIK_CERTIFICATESRESOLVERS_LE_ACME_DNSCHALLENGE_PROPAGATION: "30"
      TRAEFIK_CERTIFICATESRESOLVERS_LE_ACME_DNSCHALLENGE_PROVIDER: "ovh"
      TRAEFIK_CERTIFICATESRESOLVERS_LE_ACME_DNSCHALLENGE_RESOLVERS: "1.1.1.1,8.8.8.8"
      TRAEFIK_CERTIFICATESRESOLVERS_LE_ACME_KEYTYPE: "EC384"
      TRAEFIK_CERTIFICATESRESOLVERS_LE_ACME_EMAIL: ""
      TRAEFIK_CERTIFICATESRESOLVERS_LE_ACME_STORAGE: "/traefik/acme.json"
      # NOTE: Seems to be required to issue wildcard cert with wildcard CNAME to A record
      LEGO_DISABLE_CNAME_SUPPORT: "true"
      OVH_ENDPOINT: ${OVH_ENDPOINT}
      OVH_APPLICATION_KEY: ${OVH_APPLICATION_KEY}
      OVH_APPLICATION_SECRET: ${OVH_APPLICATION_SECRET}
      OVH_CONSUMER_KEY: ${OVH_CONSUMER_KEY}
      # NOTE: experimental features
      TRAEFIK_EXPERIMENTAL_OTLPLOGS: "true"
      # NOTE: access log
      TRAEFIK_ACCESSLOG: "true"
      TRAEFIK_ACCESSLOG_ADDINTERNALS: "true"
      TRAEFIK_ACCESSLOG_OTLP: "true"
      TRAEFIK_ACCESSLOG_OTLP_HTTP: "true"
      TRAEFIK_ACCESSLOG_OTLP_HTTP_ENDPOINT: "http://loki:3100/otlp/v1/logs"
      # NOTE: fields
      TRAEFIK_ACCESSLOG_FIELDS_DEFAULTMODE: "drop"
      TRAEFIK_ACCESSLOG_FIELDS_NAMES_SERVICENAME: "keep"
      TRAEFIK_ACCESSLOG_FIELDS_NAMES_CLIENTHOST: "keep"
      TRAEFIK_ACCESSLOG_FIELDS_NAMES_CLIENTUSERNAME: "keep"
      TRAEFIK_ACCESSLOG_FIELDS_NAMES_REQUESTHOST: "keep"
      TRAEFIK_ACCESSLOG_FIELDS_NAMES_REQUESTSCHEME: "keep"
      TRAEFIK_ACCESSLOG_FIELDS_NAMES_REQUESTMETHOD: "keep"
      TRAEFIK_ACCESSLOG_FIELDS_NAMES_REQUESTPATH: "keep"
      TRAEFIK_ACCESSLOG_FIELDS_NAMES_REQUESTPROTOCOL: "keep"
      TRAEFIK_ACCESSLOG_FIELDS_NAMES_REQUESTCONTENTSIZE: "keep"
      TRAEFIK_ACCESSLOG_FIELDS_NAMES_DOWNSTREAMSTATUS: "keep"
      TRAEFIK_ACCESSLOG_FIELDS_NAMES_DOWNSTREAMCONTENTSIZE: "keep"
      TRAEFIK_ACCESSLOG_FIELDS_NAMES_OVERHEAD: "keep"
      TRAEFIK_ACCESSLOG_FIELDS_NAMES_TLSVERSION: "keep"
      # NOTE: headers
      TRAEFIK_ACCESSLOG_FIELDS_HEADERS_DEFAULTMODE: "keep"
      TRAEFIK_ACCESSLOG_FIELDS_HEADERS_NAMES_AUTHORIZATION: "redact"
      TRAEFIK_ACCESSLOG_FIELDS_HEADERS_NAMES_COOKIE: "redact"
      TRAEFIK_ACCESSLOG_FIELDS_HEADERS_NAMES_SET-COOKIE: "redact"
      # NOTE: metrics
      TRAEFIK_METRICS_OTLP: "true"
      TRAEFIK_METRICS_OTLP_HTTP: "true"
      TRAEFIK_METRICS_OTLP_HTTP_ENDPOINT: "http://prometheus:9090/api/v1/otlp/v1/metrics"
    labels:
      <<: *traefik
      # Dashboard
      traefik.http.routers.dashboard.rule: Host(`traefik.${root_domain}`)
      traefik.http.routers.dashboard.service: api@internal
      traefik.http.routers.dashboard.middlewares: authelia@docker
      # Healthcheck
      traefik.http.routers.ping.rule: Host(`ping.${root_domain}`)
      traefik.http.routers.ping.service: ping@internal
    read_only: true
    volumes:
      - ${docker_data_folder}/traefik/data:/traefik
      - ./config/traefik/dynamic_configuration.yml:/etc/traefik/dynamic_configuration.yml:ro
    tmpfs:
      - /tmp:mode=770,noexec,size=5M,uid=${UID},gid=${GID}
    networks:
      traefik-socket-proxy:
      homer:
      nextcloud-proxy:
      robots:
      scrutiny:
      authelia-proxy:
      librespeed:
      tandoor:
      miniflux-proxy:
      lldap:
      prometheus:
      grafana:
      loki:
      jellyfin:
      anubis:
      honeycut:
      traefik-sonarr:
      traefik-radarr:
      traefik-bazarr:
      traefik-jellyseer:
      traefik-wireguard:
    <<: *common
    mem_limit: 500M
    memswap_limit: 500M
    cpu_count: 4
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: udp
        mode: host
    healthcheck:
      test:
        - "CMD"
        - "nc"
        - "-vz"
        - "127.0.0.1"
        - "80"
      start_period: 3s
      interval: 3s
      timeout: 3s
      retries: 5

  traefik-socket-proxy: &socket-proxy
    <<: *common
    image: ghcr.io/wollomatic/socket-proxy:1.12.2@sha256:bc08381bae4c2a2050f774f15d63629caf3d884c5f02fa57ff5f76a960b2ccb8
    cpu_count: 2
    mem_limit: 50M
    memswap_limit: 50M
    user: ${UID}:${docker_group_id}
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        read_only: true
    entrypoint:
      - "/socket-proxy"
      - "-loglevel=info"
      - "-listenip=0.0.0.0"
      - "-shutdowngracetime=5"
      - "-watchdoginterval=600"
      - "-stoponwatchdog"
      - "-allowhealthcheck"
    command:
      - "-allowfrom=traefik"
      # NOTE: https://github.com/wollomatic/traefik-hardened/blob/b2bfcad2a1bf727f2fea33d3d68d3eca9bb1f8da/docker-compose.yaml#L12
      - '-allowGET=/v1\..{1,2}/(version|containers/.*|events.*)'
    networks:
      - traefik-socket-proxy
    healthcheck:
      test:
        - "CMD"
        - "./healthcheck"
      interval: 10s
      timeout: 5s
      retries: 2

  honeycut:
    image: "ghcr.io/guillaumedsde/honeycut:main@sha256:fc832bff5b014a6743951e96d9aff6f8d1c96bdbeeddafa96f2aa282e9abd44f"
    <<: *common
    mem_limit: 100M
    memswap_limit: 100M
    cpu_count: 2
    read_only: true
    user: ${UID}:${COUIC_GID}
    cap_drop:
      - ALL
    environment:
      COUIC_SOCKET_PATH: "/var/run/couic/couic.sock"
      REAL_IP_HEADER_NAME: "X-Forwarded-For"
      COUIC_API_TOKEN: "${COUIC_API_TOKEN}"
      BAN_DURATION_SECONDS: "604800" # 7 days
      DRY_RUN: "false"
    networks:
      - honeycut
    volumes:
      - type: bind
        source: "/var/run/couic"
        target: "/var/run/couic"
        read_only: true
    labels:
      <<: *traefik
      traefik.http.routers.honeycut.rule: "${HONEYCUT_TRAEFIK_RULE}"
      traefik.http.routers.honeycut.priority: "-1"
      # service
      traefik.http.services.honeycut.loadbalancer.server.port: "8080"

  anubis:
    image: ghcr.io/techarohq/anubis:v1.25.0@sha256:5cf4c0d6c7ea01a356c6685a779971bdd28d6a5a4a6719201f73a9c4ae108db0
    <<: *common
    mem_limit: 100M
    memswap_limit: 100M
    cpu_count: 2
    read_only: true
    user: ${UID}:${GID}
    cap_drop:
      - ALL
    environment:
      BIND: ":8080"
      TARGET: " "
      PUBLIC_URL: "https://anubis.${root_domain}"
      COOKIE_DOMAIN: "${root_domain}"
      REDIRECT_DOMAINS: "${root_domain},*.${root_domain}"
      USE_SIMPLIFIED_EXPLANATION: "true"
      COOKIE_EXPIRATION_TIME: "72h"
      POLICY_FNAME: "/policies.yaml"
    volumes:
      - type: bind
        source: "./config/anubis/policies.yaml"
        target: "/policies.yaml"
        read_only: true
    networks:
      - anubis
    healthcheck:
      test: ["CMD", "anubis", "--healthcheck"]
      interval: 5s
      timeout: 30s
      retries: 5
      start_period: 500ms
    labels:
      <<: *traefik
      traefik.http.routers.anubis.rule: Host(`anubis.${root_domain}`)
      # service
      traefik.http.services.anubis.loadbalancer.server.port: "8080"
      # Middleware
      traefik.http.middlewares.anubis.forwardauth.address: "http://anubis:8080/.within.website/x/cmd/anubis/api/check"

  wireguard-tun-device-creator:
    image: docker.io/busybox:1-musl
    cpu_count: 2
    mem_limit: 20M
    memswap_limit: 20M
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - MKNOD
    network_mode: "none"
    volumes:
      - type: bind
        source: ${docker_data_folder}/gluetun
        target: /gluetun
    entrypoint:
      - "/bin/sh"
      - "-c"
    command:
      - |
        rm -f "/gluetun/tun"
        mknod "/gluetun/tun" c 10 200

  # Wireguard VPN client
  wireguard:
    <<: *common
    depends_on:
      wireguard-tun-device-creator:
        condition: service_completed_successfully
    image: docker.io/qmcgaw/gluetun:v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
    cap_drop:
      - ALL
    cap_add:
      # Manage firewall rules
      - NET_ADMIN
      # NOTE: allow ping
      - CAP_NET_RAW
      - CHOWN
    cpu_count: 4
    mem_limit: 500M
    memswap_limit: 500M
    tmpfs:
      - /tmp/gluetun:mode=777,uid=${UID},gid=0
    volumes:
      - type: bind
        source: ${docker_data_folder}/gluetun
        target: /gluetun
      - type: bind
        source: "./scripts/wg_tunnel_up.sh"
        target: /wg_tunnel_up.sh
        read_only: true
    devices:
      - "${docker_data_folder}/gluetun/tun:/dev/net/tun"
    networks:
      wireguard-internet:
      prometheus-flaresolverr:
        aliases: &wireguard-aliases
          - qbittorrent
          - prowlarr
          - flaresolverr
      wireguard-radarr:
        aliases: *wireguard-aliases
      wireguard-sonarr:
        aliases: *wireguard-aliases
      traefik-wireguard:
    environment:
      <<: *conf
      PUID: "${UID}"
      GUID: "${GID}"
      LOG_LEVEL: ${GLUETUN_LOG_LEVEL:-info}
      VPN_SERVICE_PROVIDER: ${VPN_SERVICE_PROVIDER}
      VPN_TYPE: "wireguard"
      SERVER_COUNTRIES: ${VPN_SERVER_COUNTRIES}
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      WIREGUARD_IMPLEMENTATION: "kernelspace"
      PUBLICIP_ENABLED: "false"
      PUBLICIP_FILE: "/gluetun/ip"
      VPN_PORT_FORWARDING_STATUS_FILE: ""
      VERSION_INFORMATION: "off"
      DNS_UPDATE_PERIOD: "0"
      BLOCK_MALICIOUS: "off"
      PORT_FORWARD_ONLY: "on"
      VPN_PORT_FORWARDING: "on"
      VPN_PORT_FORWARDING_UP_COMMAND: '/bin/sh /wg_tunnel_up.sh "{{VPN_INTERFACE}}" "{{PORT}}"'
    labels:
      <<: *traefik
      traefik.docker.network: "${COMPOSE_PROJECT_NAME}_traefik-wireguard"
      # Prowlarr
      # service
      traefik.http.services.prowlarr.loadbalancer.server.port: "9696"
      # Router
      traefik.http.routers.prowlarr.rule: Host(`prowlarr.${root_domain}`)
      traefik.http.routers.prowlarr.service: prowlarr
      traefik.http.routers.prowlarr.middlewares: authelia@docker
      # qBittorrent
      # service
      traefik.http.services.qbittorrent.loadbalancer.server.port: "8080"
      # router
      traefik.http.routers.qbittorrent.rule: Host(`torrent.${root_domain}`)
      traefik.http.routers.qbittorrent.service: qbittorrent
      traefik.http.routers.qbittorrent.middlewares: authelia@docker

  # Torrent client
  qbittorrent:
    <<: *common
    # Since the qbittorrent API offers no way to restart
    # we use the API to shutdown and docker here takes
    # care of starting it again if it shuts down.
    restart: always
    depends_on:
      wireguard:
        restart: true
        condition: service_healthy
    stop_grace_period: 90s
    stop_signal: SIGINT
    entrypoint:
      - qbittorrent-nox
    command:
      - --profile=/config
      - --confirm-legal-notice
    volumes:
      - ${docker_data_folder}/qbittorrent:/config
      - ${data_folder}:/data
      - ${docker_data_folder}/blackhole:/blackhole
      - /etc/localtime:/etc/localtime:ro
    tmpfs:
      - /tmp:mode=770,noexec,size=5M,uid=${UID},gid=${GID}
    read_only: true
    cpu_count: 6
    mem_limit: 10G
    memswap_limit: 10G
    user: ${UID}:${GID}
    cap_drop:
      - ALL
    # NOTE: use `services:` instead of `containers:` because the
    #       container is defined in the same compose file
    network_mode: service:wireguard
    image: "ghcr.io/qbittorrent/docker-qbittorrent-nox:5.2.2-1@sha256:fe64431f3b0cdfdc29713303f59a8750500f657a8df8f6ae9cf7c2df55af5969"
    healthcheck:
      start_period: 30s
      retries: 20
      interval: 15s
      test:
        - "CMD"
        - "wget"
        - "--quiet"
        - "--timeout=5"
        - "--tries=2"
        - "--spider"
        - "http://localhost:8080/"

  prowlarr:
    <<: *common
    # Since the qbittorrent API offers no way to restart
    # we use the API to shutdown and docker here takes
    # care of starting it again if it shuts down.
    restart: always
    image: ghcr.io/home-operations/prowlarr:2.4.0.5397@sha256:b7da6e9defbe0e43a361b51a4bd7f21031d8c2c751f7cc7e1c3f80503af6456c
    cpu_count: 4
    mem_limit: 3G
    memswap_limit: 3G
    read_only: true
    user: ${UID}:${GID}
    cap_drop:
      - ALL
    network_mode: service:wireguard
    depends_on:
      wireguard:
        restart: true
        condition: service_healthy
    tmpfs:
      - /tmp:mode=770,noexec,size=10M,uid=${UID},gid=${GID}
    volumes:
      - ${docker_data_folder}/prowlarr:/config
      - ${docker_data_folder}/blackhole:/blackhole
    environment:
      <<: *conf
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --timeout=3
        - --tries=1
        - --spider
        - http://localhost:9696/ping
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s

  flaresolverr:
    <<: *common
    image: ghcr.io/flaresolverr/flaresolverr:v3.5.0@sha256:139dfee1c6f89249c8d665d1333a42e8ec74ec0a86bc6bb1c8461e10d3a66a47
    depends_on:
      wireguard:
        restart: true
        condition: service_healthy
    # NOTE: default image UID is 1000
    user: 1000:1000
    cpu_count: 4
    mem_limit: 6G
    memswap_limit: 6G
    cap_drop:
      - ALL
    environment:
      <<: *conf
      PROMETHEUS_ENABLED: "true"
    network_mode: service:wireguard

  # radarr, webapp for downloading movies through torrent client
  radarr:
    <<: *common
    image: ghcr.io/home-operations/radarr:6.2.1.10461@sha256:0756fffa75b30219e3dbac8d027a5389f53cbb34ae83fa4b0976c1b0524c8eb1
    cpu_count: 4
    mem_limit: 2G
    memswap_limit: 2G
    read_only: true
    user: ${UID}:${GID}
    cap_drop:
      - ALL
    depends_on:
      qbittorrent:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
    tmpfs:
      - /tmp:mode=770,noexec,size=10M,uid=${UID},gid=${GID}
    volumes:
      - ${docker_data_folder}/radarr:/config
      - ${data_folder}:/data
    networks:
      - jellyfin-radarr
      - wireguard-radarr
      - traefik-radarr
      - bazarr-radarr
      - jellyseer-radarr
    environment:
      <<: *conf
    labels:
      <<: *traefik
      traefik.docker.network: "${COMPOSE_PROJECT_NAME}_traefik-radarr"
      traefik.http.routers.radarr.rule: Host(`movies.${root_domain}`)
      traefik.http.routers.radarr.middlewares: authelia@docker
      # service
      traefik.http.services.radarr.loadbalancer.server.port: "7878"
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --timeout=3
        - --tries=1
        - --spider
        - http://localhost:7878/ping
      interval: 5s
      timeout: 4s
      retries: 4
      start_period: 5s

  # sonarr, webapp for downloading series through torrent client
  sonarr:
    <<: *common
    image: ghcr.io/home-operations/sonarr:4.0.17.2969@sha256:6806001ccc2ec95d941c9c0de012dbcb59c6a33932cfc17f71e300bdd48cabfe
    cpu_count: 4
    mem_limit: 2G
    memswap_limit: 2G
    read_only: true
    user: ${UID}:${GID}
    cap_drop:
      - ALL
    depends_on:
      qbittorrent:
        condition: service_healthy
      prowlarr:
        condition: service_healthy
    tmpfs:
      - /tmp:mode=770,noexec,size=10M,uid=${UID},gid=${GID}
    volumes:
      - ${docker_data_folder}/sonarr:/config
      - ${data_folder}:/data
    networks:
      - traefik-sonarr
      - wireguard-sonarr
      - jellyfin-sonarr
      - bazarr-sonarr
      - jellyseer-sonarr
    environment:
      <<: *conf
      # NOTE: fix for read-only filesystems, see:
      #       https://stackoverflow.com/questions/74447989/failed-to-create-coreclr-hresult-0x80004005#comment131446515_74447989
      COMPlus_EnableDiagnostics: "0"
    labels:
      <<: *traefik
      traefik.docker.network: "${COMPOSE_PROJECT_NAME}_traefik-sonarr"
      traefik.http.routers.sonarr.rule: Host(`series.${root_domain}`)
      traefik.http.routers.sonarr.middlewares: authelia@docker
      # service
      traefik.http.services.sonarr.loadbalancer.server.port: "8989"
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --timeout=3
        - --tries=1
        - --spider
        - http://localhost:8989/ping
      interval: 5s
      timeout: 4s
      retries: 4
      start_period: 5s

  # bazarr, webapp for downloading subtitles
  bazarr:
    <<: *common
    depends_on:
      radarr:
        condition: service_healthy
      sonarr:
        condition: service_healthy
    image: ghcr.io/home-operations/bazarr:1.5.6@sha256:79fc37491f55c7e24427bcd669bce3df2d7415ca432a47ce9d53cc5988af8411
    cpu_count: 2
    mem_limit: 500M
    memswap_limit: 500M
    read_only: true
    user: ${UID}:${GID}
    cap_drop:
      - ALL
    environment:
      <<: *conf
    volumes:
      - ${docker_data_folder}/bazarr:/config
      - ${data_folder}:/data
    tmpfs:
      - /tmp:mode=770,noexec,size=10M,uid=${UID},gid=${GID}
    networks:
      - traefik-bazarr
      - bazarr-sonarr
      - bazarr-radarr
    labels:
      <<: *traefik
      traefik.docker.network: "${COMPOSE_PROJECT_NAME}_traefik-bazarr"
      traefik.http.routers.bazarr.rule: Host(`subtitles.${root_domain}`)
      traefik.http.routers.bazarr.middlewares: authelia@docker
      # service
      traefik.http.services.bazarr.loadbalancer.server.port: "6767"
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --timeout=3
        - --tries=1
        - --spider
        - http://127.0.0.1:6767
      interval: 5s
      timeout: 4s
      retries: 4
      start_period: 5s

  # homer is a homepage container
  homer:
    <<: *common
    image: docker.io/b4bz/homer:v26.4.2@sha256:ace7c6a2cfb66e13f0e94d5534cb569562f190aa5cac9446b2453ef7822cd195
    user: ${UID}:${GID}
    cpu_count: 2
    mem_limit: 100M
    memswap_limit: 100M
    read_only: true
    cap_drop:
      - ALL
    networks:
      - homer
    volumes:
      - ${docker_data_folder}/homer/config.yml:/www/assets/config.yml:ro
      - ${docker_data_folder}/homer/assets:/www/assets:ro
    labels:
      <<: *traefik
      traefik.http.routers.homer.rule: Host(`home.${root_domain}`) || Host(`${root_domain}`)
      traefik.http.routers.homer.middlewares: "authelia@docker"
      traefik.http.services.homer.loadbalancer.server.port: "8080"

  # jellyfin media server
  jellyfin:
    <<: *common
    image: docker.io/jellyfin/jellyfin:10.11.11@sha256:aefb67e6a7ff1debdd154a78a7bbb780fd0c873d8639210a7f6a2016ad2b35db
    user: ${UID}:${RENDER_GROUP_GID}
    cpu_count: 15
    mem_limit: 8G
    memswap_limit: 8G
    read_only: true
    cap_drop:
      - ALL
    depends_on:
      lldap:
        condition: service_healthy
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    tmpfs:
      - /config/data/transcodes:mode=770,size=6G,uid=${UID},gid=${GID}
      - /tmp:mode=770,noexec,size=3G,uid=${UID},gid=${GID}
    volumes:
      - type: bind
        source: ${docker_data_folder}/jellyfin
        target: /config
      - type: bind
        source: ${data_folder}/movies
        target: /data/movies
        read_only: true
      - type: bind
        source: ${data_folder}/series
        target: /data/series
        read_only: true
      - type: bind
        source: "${data_folder}/Recettes de cuisine"
        target: /data/recipes
        read_only: true
    networks:
      - jellyfin
      - prometheus-jellyfin
      - jellyfin-radarr
      - jellyfin-sonarr
      - jellyseer-jellyfin
    environment:
      <<: *conf
      # NOTE: required for read only root filesystem, see:
      #       https://github.com/dotnet/docs/issues/10217#issuecomment-462323277
      COMPlus_EnableDiagnostics: "0"
      #Uncomment forofficial Jellyfin image:
      JELLYFIN_DATA_DIR: /config/data
      JELLYFIN_CONFIG_DIR: /config
      JELLYFIN_LOG_DIR: /config/log
      JELLYFIN_CACHE_DIR: /config/cache
      JELLYFIN_FFmpeg__probesize: "2G"
      JELLYFIN_FFmpeg__analyzeduration: "800M"
      JELLYFIN_PublishedServerUrl: https://jellyfin.${root_domain}
    labels:
      <<: *traefik
      traefik.docker.network: "${COMPOSE_PROJECT_NAME}_jellyfin"
      traefik.http.routers.jellyfin.rule: Host(`jellyfin.${root_domain}`)
      traefik.http.routers.jellyfin.middlewares: "denyMetrics@file"
      # service
      traefik.http.services.jellyfin.loadbalancer.server.port: "8096"

  jellyseer:
    <<: *common
    image: ghcr.io/seerr-team/seerr:v3.3.0@sha256:2892b14e960d946fb91573792505dcba011075638f27104360fd21aa157fa2bc
    user: ${UID}:${GID}
    init: true
    cpu_count: 2
    mem_limit: 1G
    memswap_limit: 1G
    read_only: true
    cap_drop:
      - ALL
    depends_on:
      jellyfin:
        condition: service_healthy
      radarr:
        condition: service_healthy
      sonarr:
        condition: service_healthy
    volumes:
      - ${docker_data_folder}/jellyseer:/app/config
    tmpfs:
      - /tmp:mode=770,noexec,size=50M,uid=${UID},gid=${GID}
    networks:
      - traefik-jellyseer
      - jellyseer-jellyfin
      - jellyseer-radarr
      - jellyseer-sonarr
    environment:
      <<: *conf
    labels:
      <<: *traefik
      traefik.docker.network: "${COMPOSE_PROJECT_NAME}_traefik-jellyseer"
      traefik.http.middlewares.ombi-jellyseer-redirect.redirectregex.regex: "^https?://ombi.${root_domain}/(.*)"
      traefik.http.middlewares.ombi-jellyseer-redirect.redirectregex.replacement: "https://jellyseer.${root_domain}/"
      traefik.http.middlewares.ombi-jellyseer-redirect.redirectregex.permanent: "false"
      traefik.http.routers.jellyseer.rule: Host(`jellyseer.${root_domain}`) || Host(`ombi.${root_domain}`)
      traefik.http.routers.jellyseer.middlewares: ombi-jellyseer-redirect,anubis@docker
      # service
      traefik.http.services.jellyseer.loadbalancer.server.port: "5055"
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --timeout=3
        - --tries=1
        - --spider
        - http://localhost:5055
      interval: 5s
      timeout: 4s
      retries: 4
      start_period: 5s

  # personal cloud
  nextcloud: &nextcloud
    <<: *common
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_healthy
      nextcloud-imaginary:
        condition: service_healthy
      authelia:
        condition: service_healthy
    mem_limit: 8G
    memswap_limit: 8G
    cpu_count: 8
    image: docker.io/nextcloud:34.0-apache
    user: ${NEXTCLOUD_UID}:${GID}
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /run:mode=770,size=5M,uid=${NEXTCLOUD_UID},gid=${GID}
      # NOTE: /tmp needs to be proportional to max uploadable file size, see:
      #       https://docs.nextcloud.com/server/latest/admin_manual/configuration_files/big_file_upload_configuration.html#system-configuration
      - /tmp:mode=770,noexec,size=4000M,uid=${NEXTCLOUD_UID},gid=${GID}
    volumes:
      - type: "bind"
        source: "${docker_data_folder}/nextcloud"
        target: "/var/www/html"
      - type: "bind"
        source: "${user_data_folder}"
        target: "/data/users"
      - type: "bind"
        source: "./config/nextcloud/redis_config_generator.sh"
        target: "/docker-entrypoint-hooks.d/before-starting/redis_config_generator.sh"
        read_only: true
    networks:
      - nextcloud
      - nextcloud-proxy
    environment:
      <<: *conf
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
      POSTGRES_HOST: nextcloud-db
      # NOTE: HOOK_ prefix is for env var to be used with /docker-entrypoint-hooks.d/before-starting scripts
      HOOK_REDIS_HOST: nextcloud-redis
      HOOK_REDIS_HOST_PASSWORD: ${NEXTCLOUD_REDIS_PASS}
      # NOTE: see https://www.php.net/manual/en/configuration.file.php
      PHP_INI_SCAN_DIR: "/tmp/php_conf_d:"
      SMTP_HOST: "${SMTP_HOSTNAME}"
      SMTP_SECURE: ssl
      SMTP_PORT: "465"
      SMTP_AUTHTYPE: login
      SMTP_NAME: "${SMTP_USERNAME}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
      MAIL_FROM_ADDRESS: nextcloud
      MAIL_DOMAIN: ${root_domain}
      PHP_UPLOAD_LIMIT: 1G
      APACHE_BODY_LIMIT: "1073741824"
    labels:
      <<: *traefik
      traefik.docker.network: "${COMPOSE_PROJECT_NAME}_nextcloud-proxy"
      traefik.http.routers.nextcloud.rule: Host(`cloud.${root_domain}`)
      traefik.http.routers.nextcloud.middlewares: nextcloud-redirectregex
      # service
      traefik.http.services.nextcloud.loadbalancer.server.port: "80"
      traefik.http.middlewares.nextcloud-redirectregex.redirectregex.permanent: "true"
      traefik.http.middlewares.nextcloud-redirectregex.redirectregex.regex: https://cloud.${root_domain}/.well-known/(card|cal)dav
      traefik.http.middlewares.nextcloud-redirectregex.redirectregex.replacement: https://cloud.${root_domain}/remote.php/dav/
    healthcheck:
      test: curl -sSf 'http://localhost/status.php' | grep '"installed":true' | grep '"maintenance":false' | grep '"needsDbUpgrade":false' || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  nextcloud-cron:
    <<: *nextcloud
    restart: unless-stopped
    labels: {}
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -euxo pipefail
        php /var/www/html/cron.php --verbose
        sleep 5m
    healthcheck: {}

  # database for nextcloud
  nextcloud-db:
    <<: *common
    image: docker.io/postgres:17-trixie
    cpu_count: 2
    mem_limit: 2G
    memswap_limit: 2G
    shm_size: 128mb
    user: ${UID}:${GID}
    read_only: true
    cap_drop:
      - ALL
    environment:
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
      POSTGRES_USER: nextcloud
    tmpfs:
      - /run:mode=770,size=5M,uid=${UID},gid=${GID}
      - /tmp:mode=770,noexec,size=5M,uid=${UID},gid=${GID}
    volumes:
      - ${docker_data_folder}/nextcloud-db:/var/lib/postgresql/data
    networks:
      - nextcloud
    healthcheck: &postgres-healthcheck
      test:
        - "CMD-SHELL"
        - >-
          pg_isready
          --username="$${POSTGRES_USER}"
          --dbname="$${POSTGRES_USER}"
          --host=localhost
          --port=5432
      start_period: 5s
      interval: 5s
      timeout: 4s
      retries: 5

  # cache for nextcloud
  nextcloud-redis:
    <<: *common
    cpu_count: 2
    mem_limit: 250M
    memswap_limit: 250M
    read_only: true
    user: ${UID}:${GID}
    image: docker.io/valkey/valkey:9-alpine
    cap_drop:
      - ALL
    networks:
      - nextcloud
    volumes:
      - ${docker_data_folder}/nextcloud-redis:/data
    environment:
      REDISCLI_AUTH: "${NEXTCLOUD_REDIS_PASS}"
      VALKEY_EXTRA_FLAGS: "--requirepass ${NEXTCLOUD_REDIS_PASS}"
    healthcheck: &valkey-healthcheck
      test:
        - "CMD"
        - "valkey-cli"
        - "ping"

  nextcloud-imaginary:
    <<: *common
    image: docker.io/nextcloud/aio-imaginary:20260609_115915@sha256:d817f7002ca2c9c80d213b7472063f73ab58d8c5a5705ea3a19a3c3b639ba06c
    cpu_count: 12
    mem_limit: 4G
    memswap_limit: 4G
    read_only: true
    user: ${UID}:${GID}
    cap_add:
      - SYS_NICE
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:mode=770,noexec,size=2000M,uid=${UID},gid=${GID}
    command:
      - "-cpus=12"
      - "-enable-url-source"
      - "-concurrency=50"
    networks:
      - nextcloud
    healthcheck:
      start_period: 0s
      test: /healthcheck.sh
      interval: 30s
      timeout: 30s
      start_interval: 5s
      retries: 3

  miniflux:
    <<: *common
    depends_on:
      miniflux-db:
        condition: service_healthy
    image: ghcr.io/miniflux/miniflux:2.3.1-distroless@sha256:6361b075e6189c10f3ac7d18733e467bd3bbf965de2ad5a64a0fb9809456989e
    cpu_count: 2
    mem_limit: 500M
    memswap_limit: 500M
    read_only: true
    user: ${UID}:${GID}
    cap_drop:
      - ALL
    networks:
      - miniflux
      - miniflux-proxy
      - prometheus-miniflux
    environment:
      BASE_URL: "https://miniflux.${root_domain}/"
      AUTH_PROXY_HEADER: "Remote-User"
      TRUSTED_REVERSE_PROXY_NETWORKS: "${DOCKER_POOL_CIDR:-172.16.0.0/12}"
      AUTH_PROXY_USER_CREATION: "true"
      RUN_MIGRATIONS: "1"
      DATABASE_URL: "postgres://miniflux:${MINIFLUX_DB_PASSWORD}@miniflux-db:5432/miniflux?sslmode=disable"
      METRICS_COLLECTOR: "1"
      # NOTE: be careful with this if removing forward auth
      METRICS_ALLOWED_NETWORKS: "${DOCKER_POOL_CIDR:-172.16.0.0/12}"
      METRICS_USERNAME: "miniflux-metrics"
      METRICS_PASSWORD: "miniflux-metrics"
    labels:
      <<: *traefik
      traefik.docker.network: "${COMPOSE_PROJECT_NAME}_miniflux-proxy"
      traefik.http.routers.miniflux.rule: Host(`miniflux.${root_domain}`)
      traefik.http.routers.miniflux.middlewares: denyMetrics@file,authelia@docker
      # service
      traefik.http.services.miniflux.loadbalancer.server.port: "8080"

  miniflux-db:
    <<: *common
    image: docker.io/postgres:17-trixie
    cpu_count: 2
    mem_limit: 2G
    memswap_limit: 2G
    shm_size: 128mb
    user: ${UID}:${GID}
    read_only: true
    cap_drop:
      - ALL
    environment:
      POSTGRES_PASSWORD: ${MINIFLUX_DB_PASSWORD}
      POSTGRES_USER: miniflux
    tmpfs:
      - /run:mode=770,size=5M,uid=${UID},gid=${GID}
      - /tmp:mode=770,noexec,size=5M,uid=${UID},gid=${GID}
    volumes:
      - ${docker_data_folder}/miniflux-db:/var/lib/postgresql/data
    networks:
      - miniflux
    healthcheck: *postgres-healthcheck

  librespeed:
    <<: *common
    image: ghcr.io/librespeed/speedtest-rust:v1.4.0@sha256:8094b51e5b08964591ee844ebbd6cd301ae8a9b82f4f1918fae6f6dff22089e4
    cpu_count: 2
    mem_limit: 500M
    memswap_limit: 500M
    user: ${UID}:${GID}
    read_only: true
    cap_drop:
      - ALL
    volumes:
      - type: bind
        source: "./config/librespeed-rs/config.toml"
        target: "/usr/local/bin/configs.toml"
        read_only: true
    networks:
      - librespeed
    labels:
      <<: *traefik
      traefik.http.routers.librespeed.rule: Host(`librespeed.${root_domain}`)
      traefik.http.routers.librespeed.middlewares: authelia@docker
      # service
      traefik.http.services.librespeed.loadbalancer.server.port: "8080"

  tandoor-db:
    <<: *common
    image: docker.io/postgres:17-trixie
    cpu_count: 2
    mem_limit: 500M
    memswap_limit: 500M
    shm_size: 128mb
    user: ${UID}:${GID}
    read_only: true
    cap_drop:
      - ALL
    environment:
      POSTGRES_USER: tandoor
      POSTGRES_PASSWORD: ${TANDOOR_DB_PASSWORD}
    tmpfs:
      - /run:mode=770,size=5M,uid=${UID},gid=${GID}
      - /tmp:mode=770,noexec,size=5M,uid=${UID},gid=${GID}
    volumes:
      - ${docker_data_folder}/tandoor-db:/var/lib/postgresql/data
    networks:
      - tandoor
    healthcheck: *postgres-healthcheck

  tandoor:
    <<: [*common, *tandoor-image]
    cpu_count: 4
    mem_limit: 4G
    memswap_limit: 4G
    user: ${UID}:${GID}
    read_only: true
    cap_drop:
      - ALL
    depends_on:
      tandoor-db:
        condition: service_healthy
      tandoor-setup:
        condition: service_completed_successfully
    environment: &tandoor-env
      TZ: "${TZ}"
      SESSION_COOKIE_DOMAIN: "tandoor.${root_domain}"
      # see: https://github.com/TandoorRecipes/recipes/issues/3478#issue-2765281241
      ALLOWED_HOSTS: "tandoor.${root_domain},localhost"
      FORWARDED_ALLOW_IPS: "*"
      SECRET_KEY: "${TANDOOR_SECRET_KEY}"
      DB_ENGINE: django.db.backends.postgresql
      POSTGRES_HOST: tandoor-db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: tandoor
      POSTGRES_PASSWORD: "${TANDOOR_DB_PASSWORD}"
      POSTGRES_DB: tandoor
      REMOTE_USER_AUTH: "1"
      ENABLE_METRICS: "0"
      GUNICORN_MEDIA: "1"
    volumes:
      - &tandoor-static-volume
        type: bind
        source: "${docker_data_folder}/tandoor/staticfiles"
        target: "/opt/recipes/staticfiles"
      - type: bind
        source: "${docker_data_folder}/tandoor/mediafiles"
        target: "/opt/recipes/mediafiles"
    tmpfs:
      - /tmp:mode=770,noexec,size=10M,uid=${UID},gid=${GID}
    entrypoint:
      - "/opt/recipes/venv/bin/gunicorn"
    command:
      - "--bind=[::]:8080"
      - "--worker-class=gthread"
      - "--workers=2"
      - "--threads=4"
      - "--access-logfile=-"
      - "--error-logfile=-"
      - "recipes.wsgi"
    networks:
      - tandoor
    labels:
      <<: *traefik
      traefik.http.routers.tandoor.rule: Host(`tandoor.${root_domain}`)
      traefik.http.routers.tandoor.middlewares: authelia@docker
      # service
      traefik.http.services.tandoor.loadbalancer.server.port: "8080"
    healthcheck:
      test:
        - CMD
        - wget
        - --header
        - "Accept: application/json"
        - --quiet
        - --timeout=3
        - --tries=1
        - --spider
        - http://localhost:8080/openapi/
      interval: 5s
      timeout: 4s
      retries: 4
      start_period: 5s

  tandoor-setup:
    <<: [*common, *tandoor-image]
    cpu_count: 2
    mem_limit: 750M
    memswap_limit: 750M
    read_only: true
    environment: *tandoor-env
    volumes:
      - *tandoor-static-volume
    networks:
      - tandoor
    cap_drop:
      - ALL
    cap_add:
      - CAP_CHOWN
      - CAP_FOWNER
      - CAP_DAC_OVERRIDE
    entrypoint:
      - /bin/ash
      - -c
      - |
        set -euo pipefail
        source venv/bin/activate

        python manage.py migrate

        python manage.py collectstatic --noinput --clear
        chown -R "${UID}:${GID}" staticfiles

  robots:
    <<: *common
    image: docker.io/nginxinc/nginx-unprivileged:1.31-alpine-slim
    mem_limit: 200M
    memswap_limit: 200M
    cpu_count: 2
    user: ${UID}:${GID}
    read_only: true
    cap_drop:
      - ALL
    tmpfs:
      - /var/cache/nginx:mode=770,size=5M,uid=${UID},gid=${GID}
      - /var/run:mode=770,size=5M,uid=${UID},gid=${GID}
      - /tmp:mode=770,noexec,size=5M,uid=${UID},gid=${GID}
    volumes:
      - type: bind
        source: ./config/nginx/default.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
      - type: bind
        source: ./config/nginx/robots.txt
        target: /usr/share/nginx/html/robots.txt
        read_only: true
    networks:
      - robots
    labels:
      <<: *traefik
      traefik.http.routers.robots.rule: ( Host(`${root_domain}`) || HostRegexp(`[a-z]+.${root_domain}`) ) && Path(`/robots.txt`)
      # service
      traefik.http.services.robots.loadbalancer.server.port: "8080"
    healthcheck:
      test:
        - "CMD"
        - "nc"
        - "-vz"
        - "127.0.0.1"
        - "8080"
      start_period: 3s
      interval: 1s
      timeout: 1s
      retries: 5

  welephant:
    <<: *common
    depends_on:
      nextcloud-db:
        condition: service_healthy
      miniflux-db:
        condition: service_healthy
      tandoor-db:
        condition: service_healthy
      lldap-db:
        condition: service_healthy
      authelia-db:
        condition: service_healthy
    image: ghcr.io/guillaumedsde/welephant:latest
    mem_limit: 500M
    memswap_limit: 500M
    cpu_count: 4
    user: ${UID}:${GID}
    read_only: true
    cap_drop:
      - ALL
    volumes:
      - type: bind
        source: "${docker_data_folder}/welephant"
        target: "/data"
      - type: bind
        source: "./config/welephant/crontab"
        target: "/crontab"
        read_only: true
    networks:
      - nextcloud
      - miniflux
      - tandoor
      - lldap-db
      - authelia
    environment:
      TZ: "${TZ}"
      WELEPHANT_URI_NEXTCLOUD: postgres://nextcloud:${NEXTCLOUD_DB_PASSWORD}@nextcloud-db/nextcloud
      WELEPHANT_URI_MINIFLUX: postgres://miniflux:${MINIFLUX_DB_PASSWORD}@miniflux-db/miniflux
      WELEPHANT_URI_TANDOOR: postgres://tandoor:${TANDOOR_DB_PASSWORD}@tandoor-db/tandoor
      WELEPHANT_URI_LLDAP: postgres://lldap:${LLDAP_DB_PASSWORD}@lldap-db/lldap
      WELEPHANT_URI_AUTHELIA: postgres://authelia:${AUTHELIA_DB_PASSWORD}@authelia-db/authelia
    entrypoint:
      - /usr/bin/supercronic
    command:
      - /crontab

  ##################################################################
  # Monitoring

  scrutiny:
    image: ghcr.io/analogj/scrutiny:v0.9.2-omnibus@sha256:f5bf4878381fcfe63bf61b96ff6f91de8b1b8c187ec0e86c65309946fa359e2e
    <<: *common
    mem_limit: 500M
    memswap_limit: 500M
    cpu_count: 2
    cap_add:
      - SYS_RAWIO
    devices:
      - /dev/sda
      - /dev/sdb
      - /dev/sdc
      - /dev/sdd
      - /dev/sde
      - /dev/sdf
      - /dev/sdg
      - /dev/sdh
      - /dev/sdi
      - /dev/sdj
      - /dev/sdk
      - /dev/sdl
    volumes:
      - /run/udev:/run/udev:ro
      - ${docker_data_folder}/scrutiny/scrutiny:/opt/scrutiny/config
      - ${docker_data_folder}/scrutiny/influxdb:/opt/scrutiny/influxdb
    networks:
      - scrutiny
    environment:
      <<: *conf
    labels:
      <<: *traefik
      traefik.http.routers.scrutiny.rule: Host(`scrutiny.${root_domain}`)
      traefik.http.routers.scrutiny.middlewares: authelia@docker
      # service
      traefik.http.services.scrutiny.loadbalancer.server.port: "8080"
    healthcheck:
      test:
        - CMD
        - curl
        - -sSf
        - http://localhost:8080
      interval: 5s
      timeout: 4s
      retries: 4
      start_period: 5s

  prometheus:
    <<: *common
    image: docker.io/prom/prometheus:v3.12.0@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
    mem_limit: 500M
    memswap_limit: 500M
    cpu_count: 4
    user: ${UID}:${GID}
    read_only: true
    cap_drop:
      - ALL
    networks:
      - prometheus
      - prometheus-flaresolverr
      - prometheus-jellyfin
      - prometheus-authelia
      - prometheus-miniflux
      - node-exporter
    extra_hosts:
      # NOTE: make host accessible to scrape node-exporter metrics
      host.docker.internal: host-gateway
    volumes:
      - type: bind
        source: "./config/prometheus/prometheus.yml"
        target: "/etc/prometheus/prometheus.yml"
        read_only: true
      - type: bind
        source: "${docker_data_folder}/prometheus"
        target: "/prometheus"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-otlp-receiver"
    labels:
      <<: *traefik
      traefik.http.routers.prometheus.rule: Host(`prometheus.${root_domain}`)
      traefik.http.routers.prometheus.middlewares: authelia@docker
      traefik.docker.network: "${COMPOSE_PROJECT_NAME}_prometheus"
      # service
      traefik.http.services.prometheus.loadbalancer.server.port: "9090"
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --timeout=3
        - --tries=1
        - --spider
        - http://localhost:9090/-/ready
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s

  grafana:
    <<: *common
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    image: docker.io/grafana/grafana:13.0.2@sha256:5dad0df181cb644a14e13617b913b261a54f7d4fd4510721dba420929f35bea2
    mem_limit: 2G
    memswap_limit: 2G
    cpu_count: 4
    user: ${UID}:${GID}
    read_only: true
    cap_drop:
      - ALL
    networks:
      - grafana
      - prometheus
      - loki
    tmpfs:
      - /tmp:mode=770,noexec,size=5M,uid=${UID},gid=${GID}
    volumes:
      - type: bind
        source: "${docker_data_folder}/grafana"
        target: "/var/lib/grafana"
      - type: bind
        source: "./config/grafana/dashboard_definitions"
        target: "/var/lib/grafana/dashboards"
        read_only: true
      - type: bind
        source: "./config/grafana/provisioning"
        target: "/etc/grafana/provisioning"
        read_only: true
    environment:
      HOSTNAME: "grafana.${root_domain}"
      GF_SERVER_ROOT_URL: "https://grafana.${root_domain}"
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: "Remote-User"
      GF_AUTH_PROXY_HEADER_ENABLE_LOGIN_TOKEN: "false"
      GF_AUTH_DISABLE_SIGNOUT_MENU: "true"
      GF_USERS_AUTO_ASSIGN_ORG: "true"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: "Editor"
      GF_USERS_DEFAULT_THEME: "system"
      GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "true"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_SECURITY_ANGULAR_SUPPORT_ENABLED: "false"
      GF_DATE_FORMATS_USE_BROWSER_LOCALE: "true"
      GF_DATE_FORMATS_DEFAULT_TIMEZONE: "browser"
      GF_NEWS_NEWS_FEED_ENABLED: "false"
      GF_PROFILE_ENABLED: "false"
      GF_HELP_ENABLED: "false"
      GF_METRICS_ENABLED: "false"
      GF_ANALYTICS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_ANALYTICS_FEEDBACK_LINKS_ENABLED: "false"
      GF_SNAPSHOTS_ENABLED: "false"
      GF_DISABLE_SIGNOUT_MENU: "true"
    labels:
      <<: *traefik
      traefik.docker.network: "${COMPOSE_PROJECT_NAME}_grafana"
      traefik.http.routers.grafana.rule: Host(`grafana.${root_domain}`)
      traefik.http.routers.grafana.middlewares: authelia@docker
      # service
      traefik.http.services.grafana.loadbalancer.server.port: "3000"
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --timeout=3
        - --tries=1
        - --spider
        - http://localhost:3000/api/health
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s

  loki:
    <<: *common
    image: docker.io/grafana/loki:3.7.2@sha256:191d4fdfb7264f16989f0a57f320872620a5a7c2ceeec6229212c4190ec49b86
    mem_limit: 500M
    memswap_limit: 500M
    cpu_count: 4
    user: ${UID}:${GID}
    read_only: true
    cap_drop:
      - ALL
    networks:
      - grafana
      - loki
    volumes:
      - type: bind
        source: "./config/loki/configuration.yml"
        target: "/etc/loki/loki.yml"
        read_only: true
      - type: bind
        source: "${docker_data_folder}/loki"
        target: "/data"
    command:
      - "--config.file=/etc/loki/loki.yml"
    healthcheck:
      test:
        - "CMD"
        - "/usr/bin/loki"
        - "-health"
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s

  node-exporter:
    <<: *common
    image: docker.io/prom/node-exporter:v1.11.1@sha256:e9cff4fc67b1818f8c97adb115b9f12c9a54b533de86765d4a0effc01b357205
    mem_limit: 250M
    memswap_limit: 250M
    cpu_count: 2
    user: ${UID}:${GID}
    read_only: true
    pid: host
    cap_drop:
      - ALL
    volumes:
      - type: bind
        source: "/"
        target: "/host"
        read_only: true
        bind:
          propagation: "rslave"
    networks:
      - node-exporter
    command:
      - "--path.rootfs=/host"
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --timeout=3
        - --tries=1
        - --spider
        - http://localhost:9100/
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s

  ##################################################################
  # Authentication

  lldap:
    <<: *common
    depends_on:
      lldap-db:
        condition: service_healthy
    image: "ghcr.io/lldap/lldap:v0.6.3-alpine-rootless@sha256:356dc844b8486135d0e1a795ed80e977a00bd0dc8417b85bc4a525ecd53e98b2"
    cpu_count: 2
    mem_limit: "250M"
    memswap_limit: "250M"
    user: "${UID}:${GID}"
    read_only: true
    cap_drop:
      - ALL
    volumes:
      - type: "bind"
        source: "${docker_data_folder}/lldap"
        target: /data
    networks:
      - "lldap"
      - "lldap-db"
      - "jellyfin"
    environment:
      <<: *conf
      LLDAP_LDAP_HOST: "::"
      LLDAP_LDAP_PORT: "3890"
      LLDAP_JWT_SECRET: "${LLDAP_JWT_SECRET}"
      LLDAP_KEY_SEED: "${LLDAP_KEY_SEED}"
      LLDAP_LDAP_BASE_DN: "${LLDAP_LDAP_BASE_DN}"
      LLDAP_LDAP_USER_PASS: "${LLDAP_LDAP_USER_PASS}"
      LLDAP_DATABASE_URL: "postgres://lldap:${LLDAP_DB_PASSWORD}@lldap-db/lldap"
      LLDAP_HTTP_URL: "https://lldap.${root_domain}"
      LLDAP_HTTP_PORT: "17170"
      LLDAP_SMTP_OPTIONS__ENABLE_PASSWORD_RESET: "true"
      LLDAP_SMTP_OPTIONS__SERVER: "${SMTP_HOSTNAME}"
      LLDAP_SMTP_OPTIONS__PORT: "465"
      LLDAP_SMTP_OPTIONS__SMTP_ENCRYPTION: TLS
      LLDAP_SMTP_OPTIONS__USER: "${SMTP_USERNAME}"
      LLDAP_SMTP_OPTIONS__PASSWORD: "${SMTP_PASSWORD}"
      LLDAP_SMTP_OPTIONS__FROM: "lldap <lldap@${root_domain}>"
      LLDAP_SMTP_OPTIONS__TO: "${ADMIN_EMAIL}"
    labels:
      <<: *traefik
      traefik.docker.network: "${COMPOSE_PROJECT_NAME}_lldap"
      traefik.http.routers.lldap.rule: "Host(`lldap.${root_domain}`)"
      traefik.http.routers.lldap.middlewares: anubis@docker
      # service
      traefik.http.services.lldap.loadbalancer.server.port: "17170"

  lldap-db:
    <<: *common
    image: docker.io/postgres:17-trixie
    cpu_count: 2
    mem_limit: 250M
    memswap_limit: 250M
    shm_size: 128mb
    user: ${UID}:${GID}
    read_only: true
    cap_drop:
      - ALL
    environment:
      POSTGRES_USER: lldap
      POSTGRES_PASSWORD: ${LLDAP_DB_PASSWORD}
    tmpfs:
      - /run:mode=770,size=5M,uid=${UID},gid=${GID}
      - /tmp:mode=770,noexec,size=5M,uid=${UID},gid=${GID}
    volumes:
      - ${docker_data_folder}/lldap-db:/var/lib/postgresql/data
    networks:
      - lldap-db
    healthcheck: *postgres-healthcheck

  # SSO
  authelia:
    <<: *common
    depends_on:
      authelia-db:
        condition: service_healthy
      authelia-valkey:
        condition: service_healthy
      lldap:
        condition: service_healthy
    image: docker.io/authelia/authelia:4.39.20@sha256:1b363e9279e742397966333f364e0876ae02bf5c876de73e83af6d48c57ff51b
    cpu_count: 4
    user: ${UID}:${GID}
    mem_limit: 250M
    memswap_limit: 250M
    cap_drop:
      - ALL
    environment:
      # Environment variables for configuration templating
      ROOT_DOMAIN: "${root_domain}"
      X_AUTHELIA_CONFIG_FILTERS: "template"
      # OIDC
      NEXTCLOUD_OIDC_SECRET_DIGEST: "${NEXTCLOUD_OIDC_SECRET_DIGEST}"
      NEXTCLOUD_OIDC_CERT: "${NEXTCLOUD_OIDC_CERT}"
      # Global configuration
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET: ${AUTHELIA_JWT_SECRET}
      AUTHELIA_DEFAULT_REDIRECTION_URL: https://${root_domain}
      # Notifier configuration
      AUTHELIA_NOTIFIER_SMTP_ADDRESS: "smtp://${SMTP_HOSTNAME}:587"
      AUTHELIA_NOTIFIER_SMTP_USERNAME: "${SMTP_USERNAME}"
      AUTHELIA_NOTIFIER_SMTP_PASSWORD: "${SMTP_PASSWORD}"
      AUTHELIA_NOTIFIER_SMTP_SENDER: Authelia <authelia@${root_domain}>
      AUTHELIA_NOTIFIER_SMTP_STARTUP_CHECK_ADDRESS: ${ADMIN_EMAIL}
      # LDAP backend configuration
      AUTHELIA_AUTHENTICATION_BACKEND_LDAP_BASE_DN: ${LLDAP_LDAP_BASE_DN}
      AUTHELIA_AUTHENTICATION_BACKEND_LDAP_USER: "uid=authelia,ou=people,${LLDAP_LDAP_BASE_DN}"
      AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD: ${AUTHELIA_BIND_PASSWORD}
      AUTHELIA_AUTHENTICATION_BACKEND_LDAP_USERS_FILTER: "(&({username_attribute}={input})(objectclass=person)(memberOf=cn=family,ou=groups,${LLDAP_LDAP_BASE_DN}))"
      # Session configuration
      AUTHELIA_SESSION_DOMAIN: ${root_domain}
      # Storage configuration
      AUTHELIA_STORAGE_ENCRYPTION_KEY: ${AUTHELIA_DB_ENCRYPTION_KEY}
      AUTHELIA_STORAGE_POSTGRES_PASSWORD: ${AUTHELIA_DB_PASSWORD}
      AUTHELIA_SESSION_SECRET: ${AUTHELIA_SESSION_SECRET}
    command:
      - --config
      - /config/config.yml
    volumes:
      - ./config/authelia:/config:ro
    networks:
      - authelia-proxy
      - lldap
      - authelia
      - prometheus-authelia
    labels:
      <<: *traefik
      traefik.docker.network: "${COMPOSE_PROJECT_NAME}_authelia-proxy"
      traefik.http.routers.authelia.rule: Host(`authelia.${root_domain}`)
      # traefik.http.routers.authelia.middlewares: anubis@docker
      # service
      traefik.http.services.authelia.loadbalancer.server.port: "9091"
      traefik.http.middlewares.authelia.forwardauth.address: "http://authelia:9091/api/verify?rd=https://authelia.${root_domain}/"
      traefik.http.middlewares.authelia.forwardauth.trustForwardHeader: "true"
      traefik.http.middlewares.authelia.forwardauth.authResponseHeaders: Remote-User, Remote-Name, Remote-Email
    healthcheck:
      start_period: 2m

  # DB for authelia
  authelia-db:
    <<: *common
    image: docker.io/postgres:17-trixie
    cpu_count: 2
    mem_limit: 500M
    memswap_limit: 500M
    shm_size: 128mb
    user: ${UID}:${GID}
    read_only: true
    cap_drop:
      - ALL
    environment:
      POSTGRES_USER: authelia
      POSTGRES_PASSWORD: ${AUTHELIA_DB_PASSWORD}
    tmpfs:
      - /run:mode=770,size=5M,uid=${UID},gid=${GID}
      - /tmp:mode=770,noexec,size=5M,uid=${UID},gid=${GID}
    volumes:
      - ${docker_data_folder}/authelia-db:/var/lib/postgresql/data
    networks:
      - authelia
    healthcheck: *postgres-healthcheck

  authelia-valkey:
    <<: *common
    cpu_count: 2
    mem_limit: 250M
    memswap_limit: 250M
    read_only: true
    user: ${UID}:${GID}
    cap_drop:
      - ALL
    image: docker.io/valkey/valkey:9-alpine
    healthcheck: *valkey-healthcheck
    volumes:
      - ${docker_data_folder}/authelia-redis:/data
    networks:
      - authelia

